<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoreboard Control</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .wrap { max-width: 520px; width: 100%; text-align: center; }
    .icon {
      width: 80px; height: 80px;
      background: #1e2230;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      font-size: 36px;
      border: 1px solid #2a2f45;
    }
    h1 { font-size: 28px; font-weight: 700; color: #ffffff; margin-bottom: 10px; }
    p { font-size: 15px; color: #7a8099; margin-bottom: 36px; line-height: 1.6; }
    .links { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .links a {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .links a:hover { opacity: 0.8; }
    .primary { background: #4c6ef5; color: #ffffff; }
    .secondary { background: #1e2230; color: #c0c4d4; border: 1px solid #2a2f45; }
    .footer { margin-top: 48px; font-size: 13px; color: #404560; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="icon">🏟️</div>
  <h1>Scoreboard Control</h1>
  <p>
    Professional scoreboard management for sports venues.<br />
    Control scores, timers, shot clocks, and advertising displays<br />
    from your phone or tablet over Wi-Fi.
  </p>
  <div class="links">
    <a class="primary" href="support.html">Support</a>
    <a class="secondary" href="privacy-policy.html">Privacy Policy</a>
    <a class="secondary" href="terms-of-service.html">Terms of Service</a>
  </div>
  <div class="footer">&copy; 2026 iCatcher Digital Signs. All rights reserved.</div>
</div>
</body>
</html>
