name: scoreboard_flutter
description: Professional LED Scoreboard Controller for TF-F6 display systems.
publish_to: 'none'
version: 1.1.0+6

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Persistent storage
  shared_preferences: ^2.3.1
  path_provider: ^2.1.3

  # UDP networking
  udp: ^5.0.3

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
